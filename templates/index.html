<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CDE 스튜디오 대여 현황</title>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator,
    .htmx-request.htmx-indicator { display: inline; }
    input[type="month"]::-webkit-calendar-picker-indicator { filter: invert(1); }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">

  <!-- Header -->
  <header class="bg-blue-900 text-white shadow-md">
    <div class="max-w-5xl mx-auto px-4 py-3 space-y-2">

      <!-- 1행: 제목 + 새로고침 -->
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-base font-bold tracking-tight leading-tight">CDE 스튜디오 대여 현황</h1>
          <p class="text-blue-300 text-xs mt-0.5">{{ date_label }}</p>
        </div>
        <div class="flex items-center gap-2">
          <span id="spinner" class="htmx-indicator text-blue-300 text-xs animate-pulse">로딩 중…</span>
          <button
            hx-get="/table"
            hx-target="#table-container"
            hx-swap="innerHTML"
            hx-indicator="#spinner"
            class="bg-blue-700 hover:bg-blue-600 border border-blue-600 text-white px-3 py-1.5 rounded text-xs font-bold transition-colors">
            새로고침
          </button>
        </div>
      </div>

      <!-- 2행: 월 선택 + 다운로드 -->
      <div class="flex items-center gap-2 flex-wrap">
        <input type="month" id="month-picker"
               value="{{ today_ym }}"
               class="bg-blue-800 border border-blue-600 text-white rounded px-2 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-400 flex-1 min-w-0 max-w-[160px]" />
        <button onclick="downloadAs('export')"
                class="bg-emerald-700 hover:bg-emerald-600 text-white px-4 py-1.5 rounded text-xs font-bold transition-colors whitespace-nowrap">
          엑셀
        </button>
        <button onclick="downloadAs('export/txt')"
                class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-1.5 rounded text-xs font-bold transition-colors whitespace-nowrap">
          TXT
        </button>
      </div>

    </div>
  </header>

  <!-- 예약 목록 -->
  <main class="max-w-5xl mx-auto mt-4 px-3 pb-10">
    <div class="bg-white rounded-xl shadow overflow-hidden">
      <div id="table-container"
           hx-get="/table"
           hx-trigger="every 30s"
           hx-swap="innerHTML"
           hx-indicator="#spinner">
        {% include "_table.html" %}
      </div>
    </div>
  </main>

  <!-- Toast -->
  <div id="toasts" class="fixed bottom-5 right-4 flex flex-col gap-2 z-50 pointer-events-none max-w-xs w-full"></div>

  <script>
    /* ── 탭 고유 ID (같은 브라우저 탭이면 동일, 다른 기기/탭이면 다름) ── */
    const TAB_ID = sessionStorage.getItem('_tab_id') || (() => {
      const id = Math.random().toString(36).slice(2, 10);
      sessionStorage.setItem('_tab_id', id);
      return id;
    })();

    /* ── HTMX 요청마다 탭 ID 헤더 자동 첨부 ── */
    document.body.addEventListener('htmx:configRequest', e => {
      e.detail.headers['X-Tab-Id'] = TAB_ID;
    });

    /* ── 다운로드 ── */
    function downloadAs(path) {
      const val = document.getElementById('month-picker').value;
      if (!val) return;
      const [y, m] = val.split('-');
      window.location.href = `/${path}?year=${y}&month=${parseInt(m, 10)}`;
    }

    /* ── 20분 미입실 알림 ── */
    const alertedSeqs = new Set();
    const timerMap    = {};

    function showToast(title, body, color = 'bg-amber-500 border-amber-400') {
      if (Notification.permission === 'granted') new Notification(title, { body });
      const div = document.createElement('div');
      div.className = `pointer-events-auto ${color} text-white px-4 py-3 rounded-lg shadow-xl text-sm border`;
      div.innerHTML = `<p class="font-bold mb-0.5">${title}</p><p class="opacity-90 whitespace-pre-line text-xs">${body}</p>`;
      document.getElementById('toasts').appendChild(div);
      setTimeout(() => div.remove(), 9000);
    }

    window.initTimers = function () {
      const resvEl    = document.getElementById('reservation-data');
      const checkinEl = document.getElementById('checkin-data');
      if (!resvEl || !checkinEl) return;

      const items     = JSON.parse(resvEl.textContent);
      const checkedIn = new Set(JSON.parse(checkinEl.textContent));
      const now       = new Date();

      for (const [seq, tid] of Object.entries(timerMap)) {
        if (checkedIn.has(seq)) { clearTimeout(tid); delete timerMap[seq]; alertedSeqs.add(seq); }
      }

      items.forEach(item => {
        if (item.rrState !== '예약완료') return;
        const seq = String(item.rrSeq);
        if (alertedSeqs.has(seq) || timerMap[seq] || checkedIn.has(seq)) return;

        const [h, m] = item.rrStartTime.split(':').map(Number);
        const deadline = new Date(now);
        deadline.setHours(h, m + 20, 0, 0);
        const delay = deadline - now;
        if (delay <= 0) return;

        timerMap[seq] = setTimeout(() => {
          delete timerMap[seq]; alertedSeqs.add(seq);
          showToast('⚠️ 미입실 알림',
            `${item.rpName}\n${item.rrBooker}님이 ${item.rrStartTime} 예약 후 입실하지 않았습니다.`);
        }, delay);
      });
    };

    /* ── SSE: 다른 기기의 입실 변경을 실시간으로 수신 ── */
    function connectSSE() {
      const src = new EventSource('/events');

      src.addEventListener('checkin_changed', e => {
        const d = JSON.parse(e.data);
        if (d.tab === TAB_ID) return; // 내가 누른 건 HTMX가 이미 처리함

        /* 다른 기기가 변경 → 테이블 새로고침 */
        htmx.ajax('GET', '/table', { target: '#table-container', swap: 'innerHTML' });

        /* 알림 표시 */
        const isIn  = d.action === 'in';
        const title = isIn ? '✅ 입실 완료' : '↩️ 입실 취소';
        const body  = isIn
          ? `${d.rpName}\n${d.rrBooker}님 입실 완료 (${d.rrStartTime})`
          : `${d.rpName}\n${d.rrBooker}님 입실 취소`;
        const color = isIn
          ? 'bg-green-600 border-green-500'
          : 'bg-slate-500 border-slate-400';
        showToast(title, body, color);
      });

      src.onerror = () => {
        src.close();
        setTimeout(connectSSE, 3000); // 끊기면 3초 후 재연결
      };
    }

    if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
    connectSSE();
    initTimers();
  </script>
</body>
</html>
